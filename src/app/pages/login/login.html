<div class="login-page">
  <div class="login-card">
    <h1>Velène</h1>
    <p class="subtitle">Connectez-vous pour accéder à la boutique</p>

    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label for="mail">Adresse email</label>
        <input
          id="mail"
          type="email"
          placeholder="exemple@email.com"
          [(ngModel)]="mail"
          name="mail"
        />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="password-wrapper">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Votre mot de passe"
            [(ngModel)]="password"
            name="password"
          />
          <button type="button" class="toggle-eye" (click)="togglePassword()">
            <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
          </button>
        </div>
      </div>

      <div class="remember-row">
        <label class="remember-label">
          <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" />
          <span>Se souvenir de moi</span>
        </label>
      </div>

      @if (error) {
        <p class="error-msg">Email ou mot de passe incorrect.</p>
      }

      <button type="submit" class="btn-submit">Se connecter</button>
    </form>

    <p class="toggle-text">
      Pas encore de compte ?
      <a routerLink="/register" class="btn-toggle">Créer un compte</a>
    </p>
  </div>
</div>
