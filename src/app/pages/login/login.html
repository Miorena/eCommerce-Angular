<div class="login-page">
  <div class="login-card">
    <h1>{{ isRegister ? 'Créer un compte' : 'Connexion' }}</h1>
    <p class="subtitle">
      {{ isRegister ? 'Rejoignez StyleShop dès maintenant' : 'Bienvenue sur StyleShop' }}
    </p>

    <form (ngSubmit)="submit()">
      @if (isRegister) {
        <div class="form-group">
          <label for="name">Nom complet</label>
          <input id="name" type="text" placeholder="Votre nom" />
        </div>
      }

      <div class="form-group">
        <label for="email">Adresse email</label>
        <input
          id="email"
          type="email"
          placeholder="exemple@email.com"
          [(ngModel)]="email"
          name="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          id="password"
          type="password"
          placeholder="Votre mot de passe"
          [(ngModel)]="password"
          name="password"
        />
      </div>

      <button type="submit" class="btn-submit">
        {{ isRegister ? 'Créer mon compte' : 'Se connecter' }}
      </button>
    </form>

    <p class="toggle-text">
      {{ isRegister ? 'Déjà un compte ?' : 'Pas encore de compte ?' }}
      <button class="btn-toggle" (click)="isRegister = !isRegister">
        {{ isRegister ? 'Se connecter' : "S'inscrire" }}
      </button>
    </p>
  </div>
</div>
